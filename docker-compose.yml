networks:
  default:
    driver: bridge

services:
  mongodb:
    image: cjagadeesh/mongodb:v1
    container_name: mongodb
    networks:
      - roboshop

  catalogue:
    image: cjagadeesh/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
    networks:
      - roboshop
  
  redis:
    image: cjagadeesh/redis:v1
    container_name: redis
    networks:
      - roboshop


  user:
    image: cjagadeesh/user:v1
    container_name: user
    depends_on:
      - mongodb
      - redis
    networks:
      - roboshop

  cart:
    image: cjagadeesh/cart:v1
    container_name: cart
    depends_on:
      - catalogue
      - redis
    networks:
      - roboshop

  frontend:
    image: cjagadeesh/frontend:v1
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
    networks:
      - roboshop

